<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quran Web App - 30 Juz</title>
    <meta name="description" content="A premium, responsive Quran web app to read and listen to all 30 Juz — recited by Abdul Basit.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">

        <!-- Sidebar Navigation -->
        <nav class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h1>القرآن</h1>
                <p>Read by Juz</p>
            </div>
            <ul class="juz-list" id="juzList">
                <!-- Juz items injected by JS -->
            </ul>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar">
                <button id="menuToggle" class="menu-btn" aria-label="Toggle Menu">
                    <svg viewBox="0 0 24 24" width="22" height="22" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </button>
                <h2 id="currentJuzTitle">Select a Juz</h2>

                <!-- Recitation Style Selector -->
                <div class="recitation-selector" id="recitationSelector" title="Select recitation style">
                    <span class="recitation-label">🎙️</span>
                    <select id="recitationStyle" aria-label="Recitation Style">
                        <option value="2">Murattal (Standard)</option>
                        <option value="1">Mujawwad (Melodic)</option>
                    </select>
                </div>

                <!-- Theme Toggle -->
                <button id="themeToggle" class="theme-toggle-btn" aria-label="Toggle Theme">
                    <span class="icon-sun">☀️</span>
                    <span class="icon-moon">🌙</span>
                </button>
            </header>

            <div class="content-area" id="contentArea">
                <!-- Welcome Screen -->
                <div class="welcome-screen">
                    <div class="icon-quran">📖</div>
                    <h2>Welcome to the Quran App</h2>
                    <p>Select a Juz from the menu to start reading and listening.</p>
                    <p class="welcome-sub">Recitation by Sheikh Abdul Basit Abdul Samad</p>
                </div>
            </div>

            <!-- Loading Spinner -->
            <div class="loader-container hidden" id="loader">
                <div class="spinner"></div>
            </div>
        </main>
    </div>

    <!-- ── Audio Player Bar ── -->
    <div class="audio-player hidden" id="audioPlayer">
        <div class="player-verse-info">
            <div class="player-reciter">
                <span class="reciter-avatar">🎙️</span>
                <div>
                    <span class="reciter-name">Abdul Basit Abdul Samad</span>
                    <span class="reciter-style" id="reciterStyle">Murattal</span>
                </div>
            </div>
            <div class="player-ayah-info">
                <span id="playerVerseKey">—</span>
                <span id="playerVerseText" class="player-arabic"></span>
            </div>
        </div>

        <div class="player-controls-wrapper">
            <div class="player-controls">
                <button id="btnRepeat" class="ctrl-btn" title="Repeat verse">
                    <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none">
                        <polyline points="17 1 21 5 17 9"></polyline>
                        <path d="M3 11V9a4 4 0 0 1 4-4h14"></path>
                        <polyline points="7 23 3 19 7 15"></polyline>
                        <path d="M21 13v2a4 4 0 0 1-4 4H3"></path>
                    </svg>
                </button>
                <button id="btnPrev" class="ctrl-btn" title="Previous verse">
                    <svg viewBox="0 0 24 24" width="22" height="22" stroke="currentColor" stroke-width="2" fill="none">
                        <polygon points="19 20 9 12 19 4 19 20"></polygon>
                        <line x1="5" y1="19" x2="5" y2="5"></line>
                    </svg>
                </button>
                <button id="btnPlayPause" class="ctrl-btn play-btn" title="Play / Pause">
                    <svg id="iconPlay" viewBox="0 0 24 24" width="26" height="26" fill="currentColor">
                        <polygon points="5 3 19 12 5 21 5 3"></polygon>
                    </svg>
                    <svg id="iconPause" viewBox="0 0 24 24" width="26" height="26" fill="currentColor" class="hidden">
                        <rect x="6" y="4" width="4" height="16"></rect>
                        <rect x="14" y="4" width="4" height="16"></rect>
                    </svg>
                </button>
                <button id="btnNext" class="ctrl-btn" title="Next verse">
                    <svg viewBox="0 0 24 24" width="22" height="22" stroke="currentColor" stroke-width="2" fill="none">
                        <polygon points="5 4 15 12 5 20 5 4"></polygon>
                        <line x1="19" y1="5" x2="19" y2="19"></line>
                    </svg>
                </button>
                <button id="btnAutoPlay" class="ctrl-btn active" title="Auto-play all">
                    <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none">
                        <polygon points="5 3 19 12 5 21 5 3"></polygon>
                        <polyline points="14 3 19 12 14 21"></polyline>
                    </svg>
                </button>
            </div>

            <div class="progress-section">
                <span class="time-display" id="timeCurrentDisplay">0:00</span>
                <div class="progress-bar-container" id="progressBarContainer">
                    <div class="progress-bar-track">
                        <div class="progress-bar-fill" id="progressFill"></div>
                        <div class="progress-thumb" id="progressThumb"></div>
                    </div>
                </div>
                <span class="time-display" id="timeDurationDisplay">0:00</span>
            </div>
        </div>

        <div class="player-right">
            <div class="volume-control">
                <span class="volume-icon" id="volumeIcon">🔊</span>
                <input type="range" id="volumeSlider" min="0" max="1" step="0.05" value="1" class="volume-slider" aria-label="Volume">
            </div>
            <button id="btnClose" class="ctrl-btn close-btn" title="Close player">✕</button>
        </div>
    </div>

    <!-- Backdrop for mobile sidebar -->
    <div class="backdrop" id="backdrop"></div>

    <script src="script.js"></script>
</body>
</html>
